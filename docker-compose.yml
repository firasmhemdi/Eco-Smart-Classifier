services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: eco-smart-api
    container_name: eco-smart-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./eco-smart-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    image: eco-smart-frontend
    container_name: eco-smart-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
