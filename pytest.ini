[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --cov=main
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70
markers =
    data: tests for dataset schema and preprocessing quality
    nlp: tests for NLP preprocessing and vectorization
    model: tests for model loading and predictions
    api: tests for FastAPI endpoints
